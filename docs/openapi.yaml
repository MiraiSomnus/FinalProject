openapi: 3.0.3

info:
  title: Blog API
  version: 1.0.0
  description: API Documentation for Film API

servers: 
  - url: http://localhost:3000
    description: Local Server Deploynment
  - url: https://finalproject-service.onrender.com
    description: Production Server

tags:
  - name: Reviews
    description: Operations related to film reviews
  - name: Comments
    description: Operations related to comments
  - name: Films
    description: Operations related to films
  - name: Users
    description: Operations related to users
  - name: Auth 
    description: User authentication endpoints
  
paths:
  /reviews:
    get:
      tags:
        - Reviews
      summary: Get all reviews
      description: Retrieve of all film reviews
      parameters:
        - $ref: '#/components/parameters/querySearch'
        - $ref: '#/components/parameters/querySort'
        - $ref: '#/components/parameters/queryOrder'
        - $ref: '#/components/parameters/queryOffset'
        - $ref: '#/components/parameters/queryLimit'
      responses:
        '200':
          description: A list of reviews
          content:
            application/json:
              schema:
                type: array 
                items:
                  $ref: '#/components/schemas/Review'
        '400':
          $ref: '#/components/responses/InvalidPostInput'

    post:
      security:
        - bearerAuth: []
      tags:
        - Reviews
      summary: Create a new film review
      description: Creates new film reviews
      requestBody:
        description: The review object to create.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Review'
      responses:
        '201':
          description: Review created successfully 
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Review'
        '400':
          $ref: '#/components/responses/InvalidPostInput'

        '401':
          $ref: '#/components/responses/Unauthorized'
 
  
     
  /reviews/{id}:
    get:
      tags:
        - Reviews
      summary: Get a Review by ID
      description: Retrieve a single review by its ID.
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses: 
        '200':
          description: A single review
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Review'  
        '404':
          $ref: '#/components/responses/NotFound'
        '400':
          $ref: '#/components/responses/InvalidId'
    
    put:
      security:
        - bearerAuth: []
      tags:
        - Reviews
      summary: Update a review by ID
      description: Update a single film review by its ID.
      requestBody:
        description: Field to update post. "title", "content", or , "rating" must be provided
        required: true
        content:
          application/json:
            schema: 
              $ref: '#/components/schemas/UpdateReview'
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '200':
         $ref: '#/components/responses/UpdatedReview'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    
    delete:
      security:
        - bearerAuth: []
      tags:
        - Reviews
      summary: Delete a review by ID
      description: Deletes an single film review by its ID.
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '204':
          $ref: '#/components/responses/DeletedReview'
        '400':
          $ref: '#/components/responses/InvalidId'
        '401':
         $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /comments:
    get:
      security:
        - bearerAuth: []
      tags:
        - Comments
      summary: Get all comments
      description: Retrieve of all film review comments
      parameters:
        - $ref: '#/components/parameters/querySearch'
        - $ref: '#/components/parameters/querySort'
        - $ref: '#/components/parameters/queryOrder'
        - $ref: '#/components/parameters/queryOffset'
        - $ref: '#/components/parameters/queryLimit'
      responses:
        '200':
          description: A list of comments
          content:
            application/json:
              schema:
                type: array 
                items:
                  $ref: '#/components/schemas/Comment'
        '400':
          $ref: '#/components/responses/InvalidPostInput'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      security:
        - bearerAuth: []
      tags:
        - Comments
      summary: Create a new comment
      description: Creates new comment for a pre-existing film review
      requestBody:
        description: The comment object to create.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Comment'
      responses:
        '201':
          description: Comment created successfully 
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Comment'
        '400':
          $ref: '#/components/responses/BadRequest'

        '401':
          $ref: '#/components/responses/Unauthorized'

  /comments/{id}:
    get:
      security:
      - bearerAuth: []
      tags:
        - Comments
      summary: Get a Comment by ID
      description: Retrieve a single comment by its ID.
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses: 
        '200':
          description: A single comment
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Comment'  
        '404':
          $ref: '#/components/responses/NotFound'
        '400':
          $ref: '#/components/responses/InvalidId'
    
    put:
      security:
        - bearerAuth: []
      tags:
        - Comments
      summary: Update a Comment by ID
      description: Update a single comment by its ID.
      requestBody:
        description: Field to update comment.  "content" must be provided
        required: true
        content:
          application/json:
            schema: 
              $ref: '#/components/schemas/UpdateComment'
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '200':
         $ref: '#/components/responses/UpdatedComment'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    
    delete:
      security:
        - bearerAuth: []
      tags:
        - Comments
      summary: Delete a review by ID
      description: Deletes an single film review by its ID.
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '204':
          $ref: '#/components/responses/DeletedComment'
        '400':
          $ref: '#/components/responses/InvalidId'
        '401':
         $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /users:
    get:
      security:
        - bearerAuth: []
      tags:
        - Users
      summary: Get all users(ADMIN)
      description: Retrieve all of the current users if you carry the ADMIN role
      responses:
        '200':
          description: A list of users
          content:
            application/json:
              schema:
                type: array 
                items:
                  $ref: '#/components/schemas/User'
        '401':
         $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  
  /users/me:
      get:
        security:
          - bearerAuth: []
        tags:
          - Users
        summary: Returns a user their account information
        description: Returns a user their account information
        responses:
          '200':
            description: User's account info
            content:
              application/json:
                schema:
                  type: array 
                  items:
                    $ref: '#/components/schemas/User'
          '401':
           $ref: '#/components/responses/Unauthorized'

  /users/me/reviews:
      get:
        security:
          - bearerAuth: []
        tags:
          - Users
        summary: Returns a user their reviews
        description: Returns a user their reviews
        responses:
          '200':
            description: User's Reviews
            content:
              application/json:
                schema:
                  type: array 
                  items:
                    $ref: '#/components/schemas/Review'
          '401':
           $ref: '#/components/responses/Unauthorized'

      put:
        security:
          - bearerAuth: []
        tags:
          - Users
        summary: Update Account Info 
        description: Update user Information such as email or password.
        requestBody:
          description: Field to update user information.  "email" or "password" must be provided
          required: true
          content:
            application/json:
              schema: 
                $ref: '#/components/schemas/UpdateUser'
        responses:
          '200':
           $ref: '#/components/responses/UpdatedUser'
          '400':
            $ref: '#/components/responses/BadRequest'
          '401':
            $ref: '#/components/responses/Unauthorized'
          '403':
            $ref: '#/components/responses/Forbidden'
          '404':
            $ref: '#/components/responses/NotFound'

      delete:
        security:
          - bearerAuth: []
        tags:
          - Users
        summary: Delete User Account
        description: Allows User to delete their account.
        responses:
          '204':
            $ref: '#/components/responses/DeletedUser'
          '400':
            $ref: '#/components/responses/InvalidId'
          '401':
           $ref: '#/components/responses/Unauthorized'
          '403':
            $ref: '#/components/responses/Forbidden'
          '404':
            $ref: '#/components/responses/NotFound'

  /films:
    get:
      security:
          - bearerAuth: []
      tags:
          - Films
      summary: Get all films
      description: Retrieves all listed films
      parameters:
        - $ref: '#/components/parameters/querySearch'
        - $ref: '#/components/parameters/querySort'
        - $ref: '#/components/parameters/queryOrder'
        - $ref: '#/components/parameters/queryOffset'
        - $ref: '#/components/parameters/queryLimit'
      responses:
        '200':
          description: A list of films
          content:
            application/json:
              schema:
                type: array 
                items:
                  $ref: '#/components/schemas/Film'
        '400':
          $ref: '#/components/responses/InvalidPostInput'
        '401':
           $ref: '#/components/responses/Unauthorized'
    post:
      security:
        - bearerAuth: []
      tags:
        - Films
      summary: Create a new film(ADMIN)
      description: Allows a Admin to add a new film 
      requestBody:
        description: The new film listing  being created
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Film'
      responses:
        '201':
          description: Film created successfully 
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Film'
        '400':
          $ref: '#/components/responses/InvalidPostInput'

        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  
  /films/{id}:
    get:
      security:
        - bearerAuth: []
      tags:
        - Films
      summary: Get a Film by ID
      description: Retrieve a single Film by its ID.
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses: 
        '200':
          description: A single film
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Film'  
        '404':
          $ref: '#/components/responses/NotFound'
        '400':
          $ref: '#/components/responses/InvalidId'
    put:
      security:
        - bearerAuth: []
      tags:
        - Films
      summary: Update a Film by ID(ADMIN)
      description: Update a single film by its ID only if you are an admin.
      requestBody:
        description: Field to update film. "title", "genre", 'director' or , "releaseYear" must be provided
        required: true
        content:
          application/json:
            schema: 
              $ref: '#/components/schemas/UpdateFilm'
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '200':
         $ref: '#/components/responses/UpdatedFilm'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
      
    delete:
        security:
          - bearerAuth: []
        tags:
          - Films
        summary: Deletes a Film by ID(ADMIN)
        description: Allows admin to delete a film.
        parameters:
        - $ref: '#/components/parameters/ResourceId'
        responses:
          '204':
            description: Film successfully Deleted
          '400':
            $ref: '#/components/responses/InvalidId'
          '401':
           $ref: '#/components/responses/Unauthorized'
          '403':
            $ref: '#/components/responses/Forbidden'
          '404':
            $ref: '#/components/responses/NotFound'


  /auth/login:
    post:
      tags:
        - Auth
      summary: Authenticate user
      description: Authenticate a user and return an access token 
      requestBody:
        description: User login credentials
        required: true
        content:
          application/json:
            schema: 
              $ref: '#/components/schemas/AuthCredentials'
      responses:
        '200':
          description: Authentication successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  accessToken:
                    type: string
                example:
                  accessToken: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...'
        '400':
          $ref: '#/components/responses/InvalidUserInput'
        '401':
           $ref: '#/components/responses/Unauthorized'
  /auth/signup:
    post:
      tags:
        - Auth
      summary: Register User
      description: Creates a new user account
      requestBody:
        description: User signup credentials
        required: true
        content:
          application/json:
            schema: 
                type: object
                properties:
                  email:
                    type: string
                    example: user@email.com
                  password:
                    type: string
                    example: 'password123'
      responses:
        '201':
         $ref: '#/components/responses/RegisteredUser' 
        '400':
          $ref: '#/components/responses/InvalidUserInput'
        '409':
          $ref: '#/components/responses/DuplicateEmail'

  /health:
    get:
      summary: Health Check
      description: Returns the current status of the API. Used by Render to verify that the service is running.
      tags:
        - Monitoring
      responses:
        '200':
          description: API is running successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
components:
  schemas:
    Review:
      type: object
      properties:
        id: 
          type: integer
          readOnly: true
          example: 1
        title:
          type: string
          example: 'Film Review Title'
        content:
          type: string
          example: 'This is the content of the film review'
        rating:
          type : integer
          example: 5
        createdAt: 
          type: string
          readOnly: true
          example: '2026-04-04T20:30:002'
        reviewerId: 
          type: integer
          readOnly: true
          example: 1
    
    User:
       type: object
       properties:
        id: 
          type: integer
          readOnly: true
          example: 1
        email:
          type: string
          example: 'user@email.com'
        role:
          type: string
          example: 'USER'

    Film:
      type: object
      properties:
        id: 
          type: integer
          readOnly: true
          example: 1
        title:
          type: string
          example: 'Title of the film'
        genre:
          type: string
          example: 'Genre of the film'
        director:
          type : string
          example: 'Director of the film'
        releaseYear:
          type: integer
          example: 2023

    UpdateReview:
      type: object
      properties:
        title:
          type: string
          example: 'Updated Review'
        content:
          type: string
          example: 'This is the updated content of the review'
        rating:
          type: integer
          example: 3

    UpdateFilm:
      type: object
      properties:
        title:
          type: string
          example: 'Updated Film Title'
        genre:
          type: string
          example: 'Updated Film Genre'
        director:
          type: string
          example: 'Updated Film Director'
        releaseYear:
          type: integer
          example: 2028

    UpdateComment:
      type: object
      properties:
        content:
          type: string
          example: 'This is the updated comment'

    UpdateUser:
      type: object
      properties:
        email:
          type: string
          example: 'user@email.com'
        password:
          type: string
          example: 'Password123'
    
    PatchUser:
      type: object
      properties:
        role:
          type: string
          example: 'USER'

    Comment:
      type: object
      properties:
        id: 
          type: integer
          readOnly: true
          example: 1
        reviewId:
          type: integer
          example: 1
        content:
          type: string
          example: 'This is the content of the comment'
        createdAt: 
          type: string
          readOnly: true
          example: '2026-04-28T20:30:002'
        reviewerId: 
          type: integer
          readOnly: true
          example: 1

    AuthCredentials:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      example:
        email: 'user@email.com'
        password: 'password123'


  parameters:
    ResourceId:
     name: id
     in: path
     required: true
     description: Resource ID
     schema: 
      type: integer
      example: 1

    querySearch:
      name: search
      in: query
      required: false 
      description: Filter post by matching title or content
      schema: 
        type: string
        example: example 

    querySort:
      name: sortBy
      in: query
      required: false
      description: Field to sort by (e.g., createdAt, title)
      schema:
        type: string
        example: createdAt     
      
    queryOrder:
      name: order
      in: query
      required: false
      description: Sort order 
      schema:
        type: string
        enum: [asc,desc]
        example: desc   
    
    queryOffset:
      name: offset
      in: query
      required: false
      description: Number of posts to skip
      schema:
        type: integer
        example: 0

    queryLimit:
      name: limit
      in: query
      required: false
      description: Number of posts to  return per page
      schema:
        type: integer
        example: 10
  
  responses:
    NotFound:
      description: Resource Not found
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
            example: 
              error: 'Resource 1 not found'
    
    InvalidId:
      description: Invalid ID
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: array
                items:
                  type: string
            example:
              errors: ["ID Must Be a Postive Integer"]

    InvalidPostInput:
      description: Bad request due to invalid data
      content:
        application/json:
          schema:
            type: object
            properties:
              errors:
                type: array
                items:
                  type: string
            example:
              errors: 
              - 'Title must be atleast 3 characters'
    
    BadRequest:
      description: Bad request due to invalid input or invalid ID
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: array
                items:
                  type: string
            example:
              errors: ["ID Must Be a Postive Integer","Title must be at least 3"]

    Unauthorized:
      description: Client is not authenticated
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
            example:
              error: 'Not authenticated. Please provide a valid token.'

    InvalidUserInput:
      description: Bad request due to invalid date
      content:
        application/json:
          schema:
            type: object
            properties:
              errors:
                type: array 
                items:
                  type: string
            example:
              errors:
              - 'Email is required'
              - 'Password is required'

    RegisteredUser:
      description: Sign up successful
      content:
        application/json:
          schema:
            type: object
            properties:
              id:
                type: integer
                readOnly: true
                example: 1
              email:
                type: string
                readOnly: true
                example: user@test.com
              role:
                type: string
                readOnly: true
                example: USER
    
    UpdatedReview:
      description: Review Updated successfully
      content:
        application/json:
          schema:
            type: object
            properties:
              id: 
                type: integer
                readOnly: true
                example: 1
              title:
                type: string
                example: 'Film Review Title'
              content:
                type: string
                example: 'This is the content of the film review'
              createdAt: 
                type: string
                readOnly: true
                example: '2026-04-28T20:30:002'
              reviewerId: 
                type: integer
                readOnly: true
                example: 1

    UpdatedFilm:
      description: Film Updated successfully
      content:
        application/json:
          schema:
            type: object
            properties:
              id: 
                type: integer
                readOnly: true
                example: 1
              title:
                type: string
                example: 'Title of the film'
              genre:
                type: string
                example: 'Genre of the film'
              director:
                type : string
                example: 'Director of the film'
              releaseYear:
                type: integer
                example: 2023
            

    UpdatedComment:
      description: Comment Updated successfully
      content:
        application/json:
          schema:
            type: object
            properties:
              id: 
                type: integer
                readOnly: true
                example: 1
              reviewId:
                type: integer
                example: 1
              content:
                type: string
                example: 'This is the content of the comment'
              createdAt: 
                type: string
                readOnly: true
                example: '2026-04-28T20:30:002'
              reviewerId: 
                type: integer
                readOnly: true
                example: 1

    UpdatedUser:
        description: User Updated successfully
        content:
          application/json:
            schema:
              type: object
              properties:
                id: 
                  type: integer
                  readOnly: true
                  example: 1
                email:
                  type: string
                  example: 'user@email.com'
                role:
                  type: string
                  example: 'USER'
                  

    Forbidden:
      description: 'Client is not authorized'
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
            example: 
              error: 'Forbidden: insufficient permission'

    DeletedReview:
      description: Review deleted successfully

    DeletedComment:
      description: Comment deleted successfully

    DeletedUser:
      description: User deleted successfully

    DuplicateEmail:
      description: Duplicate Email 
      content:
        application/json:
          schema:
            type: object
            properties:
              email : 
                type: string
                readOnly: true
                example: user@test.com
              error:
                type: string
            example: 
              error: 'Email has already been used'


  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT


